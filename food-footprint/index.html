<!doctype html>
<html lang="en">
  <head>
    <script type="module" src="/src/main.js"></script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>food-footprint</title>
  </head>
  <body class="h-screen flex flex-col bg-gray-950 text-white overflow-hidden">

    <!-- TOP BAR -->
    <header id="top-bar" class="flex items-center justify-center gap-4 p-4 border-b border-gray-800">
      <!-- food cards will be injected here by ui.js -->
      <button id="add-food-btn" class="flex items-center gap-2 px-4 py-2 border fill border-gray-600 rounded-lg text-gray-400 hover:text-white hover:border-white transition">
        + Add Food
      </button>
      <div>
        <select id="preset-selector" class="bg-gray-900 border border-gray-600 rounded-lg px-1 py-2 text-gray-400 hover:border-white transition focus:outline-none cursor-pointer">
        </select>
        <div class="flex flex-col items-center gap-1 pt-2">
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="data-mode-toggle" class="sr-only peer">
          <div class="w-12 h-6 bg-gray-700 rounded-full peer peer-checked:bg-red-800 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
        </label>
        <span class="text-xs text-gray-400" id="data-mode-label">Average</span>
      </div>
    </div>
    </header>

    <!-- DASHBOARD -->
    <main class="flex-1 grid grid-cols-4 divide-x divide-gray-800 min-h-0">

      <div id="panel-land" class="p-4 overflow-hidden">
      </div>

      <div id="panel-ghg" class="p-4 overflow-hidden">
      </div>

      <div id="panel-water" class="p-4 overflow-hidden">
      </div>

      <div id="panel-deaths" class="p-4 overflow-hidden">
      </div>

    </main>

    <div id="tooltip-ghg" class="absolute hidden bg-gray-800 text-white text-sm rounded-lg p-3 max-w-xs pointer-events-none shadow-lg border border-gray-600">
    </div>

  </body>
</html>
